<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>
    <link rel="shortcut icon" href="/logo.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-black/90">

    <main class="card">

        <section class="container flex flex-col mx-auto w-[600px] mt-60 py-10 text-center border-2 border-white backdrop-blur-md bg-black/40 rounded-md shadow">
            <h1 class="text-red-500 font-bold text-3xl">Desafio 3: Contador</h1>
        
            <p class="mt-5 text-blue-600">Use os botões para aumentar, diminuir e resetar o valor.</p>

            <span class="mt-8 text-5xl font-semibold text-white" id="contadorValor">0</span>

            <div class="text-white mt-10 space-x-5 mx-auto">
                <button class="bg-red-600 w-20 h-10 text-lg font-semibold rounded-sm cursor-pointer shadow-sm hover:bg-red-700 transform ease-out duration-200" 
                onclick="sub()" id="diminuir">-1</button>
                <button class="bg-black/40 w-20 h-10 text-lg font-semibold rounded-sm cursor-pointer shadow-sm hover:bg-black transform ease-out duration-200" 
                onclick="reset()" id="resetar">Resetar</button>
                <button class="bg-green-600 w-20 h-10 text-lg font-semibold rounded-sm cursor-pointer shadow-sm hover:bg-green-700 transform ease-out duration-200" 
                onclick="add()" id="aumentar">+1</button>
            </div>
        </section>

    </main>

    <script src="/tailwind.config.js"></script>
    <script src="script.js"></script>
</body>
</html>
